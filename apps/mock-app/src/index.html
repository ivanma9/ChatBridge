<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quick Quiz</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { font-family: system-ui, -apple-system, sans-serif; background: #f8f9fa; color: #1a1a2e; padding: 20px; }
      .quiz-container { max-width: 480px; margin: 0 auto; }
      h1 { font-size: 1.25rem; margin-bottom: 4px; }
      .topic-badge { display: inline-block; background: #e8eaff; color: #4a4ae0; padding: 2px 10px; border-radius: 12px; font-size: 0.8rem; margin-bottom: 16px; }
      .progress { display: flex; gap: 6px; margin-bottom: 16px; }
      .progress-dot { width: 10px; height: 10px; border-radius: 50%; background: #d1d5db; transition: background 0.2s; }
      .progress-dot.answered { background: #4a4ae0; }
      .progress-dot.current { background: #4a4ae0; box-shadow: 0 0 0 3px rgba(74,74,224,0.25); }
      .question { font-size: 1rem; font-weight: 600; margin-bottom: 12px; }
      .options { display: flex; flex-direction: column; gap: 8px; }
      .option-btn { text-align: left; padding: 10px 14px; border: 2px solid #e2e4e9; border-radius: 8px; background: #fff; font-size: 0.9rem; cursor: pointer; transition: all 0.15s; }
      .option-btn:hover { border-color: #4a4ae0; background: #f0f0ff; }
      .option-btn.selected { border-color: #4a4ae0; background: #e8eaff; }
      .option-btn.correct { border-color: #22c55e; background: #f0fdf4; }
      .option-btn.wrong { border-color: #ef4444; background: #fef2f2; }
      .option-btn:disabled { cursor: default; opacity: 0.85; }
      .result-card { text-align: center; padding: 24px; background: #fff; border-radius: 12px; border: 2px solid #e2e4e9; }
      .result-score { font-size: 2.5rem; font-weight: 700; color: #4a4ae0; }
      .result-label { font-size: 0.9rem; color: #6b7280; margin-top: 4px; }
      .status-bar { margin-top: 16px; padding: 8px 12px; background: #fff; border-radius: 8px; border: 1px solid #e2e4e9; font-size: 0.75rem; color: #6b7280; }
      .status-bar .event { color: #4a4ae0; font-weight: 600; }
    </style>
  </head>
  <body>
    <div class="quiz-container">
      <div id="app"></div>
      <div class="status-bar" id="status">Bridge: waiting for host…</div>
    </div>

    <script>
      // ── Quiz Data (keyed by topic, fallback to general) ─────────────
      const QUIZZES = {
        geography: [
          { q: "What is the longest river in the world?", opts: ["Amazon", "Nile", "Yangtze", "Mississippi"], answer: 1 },
          { q: "Which country has the most time zones?", opts: ["Russia", "USA", "France", "China"], answer: 2 },
          { q: "What is the smallest continent by land area?", opts: ["Europe", "Antarctica", "Australia", "South America"], answer: 2 },
        ],
        science: [
          { q: "What planet is closest to the Sun?", opts: ["Venus", "Mercury", "Mars", "Earth"], answer: 1 },
          { q: "What gas do plants absorb from the atmosphere?", opts: ["Oxygen", "Nitrogen", "Carbon dioxide", "Hydrogen"], answer: 2 },
          { q: "How many bones are in the adult human body?", opts: ["196", "206", "216", "186"], answer: 1 },
        ],
        history: [
          { q: "In what year did the Berlin Wall fall?", opts: ["1987", "1989", "1991", "1985"], answer: 1 },
          { q: "Who was the first person to walk on the Moon?", opts: ["Buzz Aldrin", "Neil Armstrong", "Yuri Gagarin", "John Glenn"], answer: 1 },
          { q: "The Magna Carta was signed in which century?", opts: ["12th", "13th", "14th", "15th"], answer: 1 },
        ],
      };
      // Fallback for unknown topics
      QUIZZES._default = QUIZZES.geography;

      // ── State ───────────────────────────────────────────────────────
      let state = {
        topic: null,
        currentIndex: 0,
        answers: [],      // index of selected option per question, -1 = unanswered
        finished: false,
      };
      let questions = [];
      let hostOrigin = null;

      // ── Bridge helpers ──────────────────────────────────────────────
      function send(event) {
        if (window.parent !== window && hostOrigin) {
          window.parent.postMessage(event, hostOrigin);
        }
        log("↑ " + event.type);
      }

      function log(msg) {
        const el = document.getElementById("status");
        el.innerHTML = `Bridge: <span class="event">${msg}</span>`;
      }

      // ── Rendering ───────────────────────────────────────────────────
      function render() {
        const root = document.getElementById("app");
        if (!state.topic) {
          root.innerHTML = `<h1>Quick Quiz</h1><p style="color:#6b7280;margin-top:8px;">Waiting for topic from host…</p>`;
          return;
        }

        if (state.finished) {
          const score = questions.reduce((s, q, i) => s + (state.answers[i] === q.answer ? 1 : 0), 0);
          root.innerHTML = `
            <h1>Quick Quiz</h1>
            <span class="topic-badge">${state.topic}</span>
            <div class="result-card">
              <div class="result-score">${score}/${questions.length}</div>
              <div class="result-label">questions correct</div>
            </div>`;
          return;
        }

        const q = questions[state.currentIndex];
        const answered = state.answers[state.currentIndex] !== -1;

        root.innerHTML = `
          <h1>Quick Quiz</h1>
          <span class="topic-badge">${state.topic}</span>
          <div class="progress">
            ${questions.map((_, i) => {
              let cls = "progress-dot";
              if (i === state.currentIndex) cls += " current";
              if (state.answers[i] !== -1) cls += " answered";
              return `<div class="${cls}"></div>`;
            }).join("")}
          </div>
          <div class="question">${state.currentIndex + 1}. ${q.q}</div>
          <div class="options">
            ${q.opts.map((opt, i) => {
              let cls = "option-btn";
              if (answered) {
                if (i === q.answer) cls += " correct";
                else if (i === state.answers[state.currentIndex]) cls += " wrong";
                cls += '" disabled="true';
              }
              return `<button class="${cls}" data-idx="${i}">${opt}</button>`;
            }).join("")}
          </div>`;

        if (!answered) {
          root.querySelectorAll(".option-btn").forEach(btn => {
            btn.addEventListener("click", () => onAnswer(parseInt(btn.dataset.idx, 10)));
          });
        }
      }

      // ── Interaction ─────────────────────────────────────────────────
      function onAnswer(idx) {
        state.answers[state.currentIndex] = idx;
        render();

        // Save state after each answer
        send({ type: "app:save-state", payload: { state: { ...state } } });

        // Brief delay to show correct/wrong, then advance
        setTimeout(() => {
          if (state.currentIndex < questions.length - 1) {
            state.currentIndex++;
            render();
            send({ type: "app:save-state", payload: { state: { ...state } } });
            notifyResize();
          } else {
            finishQuiz();
          }
        }, 800);
      }

      function finishQuiz() {
        state.finished = true;
        render();

        const score = questions.reduce((s, q, i) => s + (state.answers[i] === q.answer ? 1 : 0), 0);
        const details = questions.map((q, i) => ({
          question: q.q,
          selected: q.opts[state.answers[i]],
          correct: q.opts[q.answer],
          isCorrect: state.answers[i] === q.answer,
        }));

        send({
          type: "app:complete",
          payload: {
            summary: `Scored ${score}/${questions.length} on ${state.topic}`,
            output: { score, total: questions.length, topic: state.topic, details },
          },
        });

        notifyResize();
      }

      function notifyResize() {
        const height = document.documentElement.scrollHeight;
        send({ type: "app:resize", payload: { height } });
      }

      // ── Boot from topic (host:init or host:resume-session) ─────────
      function boot(topic) {
        const key = topic.toLowerCase().trim();
        questions = QUIZZES[key] || QUIZZES._default;
        if (!state.topic) {
          state.topic = topic;
          state.answers = questions.map(() => -1);
        }
        render();
        notifyResize();
      }

      // ── Bridge listener ─────────────────────────────────────────────
      window.addEventListener("message", (e) => {
        // Accept any origin for local dev; in production the host validates us
        const msg = e.data;
        if (!msg || !msg.type) return;

        log("↓ " + msg.type);

        switch (msg.type) {
          case "host:init": {
            hostOrigin = e.origin;
            // Send ready immediately
            send({ type: "app:ready", payload: { appId: "mock-app", version: "0.2.0" } });
            // If tool input comes later via host:tool-result, we wait.
            // But allow the host to pass topic in init payload for convenience.
            if (msg.payload && msg.payload.input && msg.payload.input.topic) {
              boot(msg.payload.input.topic);
            }
            break;
          }

          case "host:resume-session": {
            hostOrigin = e.origin;
            if (msg.payload && msg.payload.state) {
              state = { ...state, ...msg.payload.state };
              const key = (state.topic || "").toLowerCase().trim();
              questions = QUIZZES[key] || QUIZZES._default;
            }
            send({ type: "app:ready", payload: { appId: "mock-app", version: "0.2.0" } });
            render();
            notifyResize();
            break;
          }

          case "host:tool-result": {
            // The host may deliver the tool invocation result here
            if (msg.payload && msg.payload.result && msg.payload.result.topic) {
              boot(msg.payload.result.topic);
            }
            break;
          }

          case "host:request-complete": {
            // Host is asking us to wrap up
            if (!state.finished) {
              finishQuiz();
            }
            break;
          }

          default:
            break;
        }
      });

      // ── Initial render ──────────────────────────────────────────────
      render();

      // Read topic from URL params (works both standalone and in iframe via proxy)
      const params = new URLSearchParams(window.location.search);
      const urlTopic = params.get("topic");
      if (urlTopic) {
        hostOrigin = window.parent !== window ? "*" : window.location.origin;
        boot(urlTopic);
        log(window.parent === window
          ? "standalone mode — topic: " + urlTopic
          : "iframe mode — topic from URL: " + urlTopic);
      } else if (window.parent === window) {
        log("standalone mode — no topic");
      }
    </script>
  </body>
</html>
