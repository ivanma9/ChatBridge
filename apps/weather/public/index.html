<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weather</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { font-family: system-ui, -apple-system, sans-serif; background: #f8f9fa; color: #1a1a2e; padding: 20px; }
      .weather-container { max-width: 520px; margin: 0 auto; }
      h1 { font-size: 1.25rem; margin-bottom: 4px; }
      .location-label { color: #6b7280; font-size: 0.85rem; margin-bottom: 16px; }

      /* Search bar (standalone mode) */
      .search-bar { display: flex; gap: 8px; margin-bottom: 16px; }
      .search-bar input { flex: 1; padding: 10px 14px; border: 2px solid #e2e4e9; border-radius: 8px; font-size: 0.9rem; font-family: inherit; outline: none; transition: border-color 0.15s; }
      .search-bar input:focus { border-color: #4a4ae0; }
      .search-bar button { padding: 10px 18px; background: #4a4ae0; color: #fff; border: none; border-radius: 8px; font-size: 0.9rem; font-weight: 600; cursor: pointer; transition: background 0.15s; }
      .search-bar button:hover { background: #3b3bb5; }

      /* Current conditions card */
      .current-card { background: #fff; border-radius: 12px; border: 2px solid #e2e4e9; padding: 24px; margin-bottom: 12px; }
      .current-header { display: flex; justify-content: space-between; align-items: flex-start; }
      .current-temp { font-size: 3rem; font-weight: 700; color: #4a4ae0; line-height: 1; }
      .current-temp-alt { font-size: 1rem; font-weight: 400; color: #6b7280; }
      .current-icon { font-size: 3rem; line-height: 1; }
      .current-desc { font-size: 1rem; font-weight: 600; margin-top: 8px; }
      .current-feels { font-size: 0.85rem; color: #6b7280; margin-top: 2px; }
      .current-details { display: flex; gap: 24px; margin-top: 16px; padding-top: 12px; border-top: 1px solid #e2e4e9; }
      .detail-item { font-size: 0.85rem; color: #6b7280; }
      .detail-value { font-weight: 600; color: #1a1a2e; }

      /* Unit toggle */
      .unit-toggle { display: inline-flex; border: 2px solid #e2e4e9; border-radius: 8px; overflow: hidden; margin-left: auto; }
      .unit-btn { padding: 4px 12px; font-size: 0.8rem; font-weight: 600; border: none; background: #fff; color: #6b7280; cursor: pointer; transition: all 0.15s; }
      .unit-btn.active { background: #4a4ae0; color: #fff; }
      .title-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; }

      /* Section labels */
      .section-label { font-size: 0.8rem; font-weight: 600; color: #6b7280; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; margin-top: 16px; }

      /* Hourly forecast */
      .hourly-scroll { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 8px; margin-bottom: 12px; }
      .hourly-scroll::-webkit-scrollbar { height: 4px; }
      .hourly-scroll::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 2px; }
      .hourly-item { flex: 0 0 56px; background: #fff; border-radius: 10px; border: 2px solid #e2e4e9; padding: 10px 4px; text-align: center; }
      .hourly-time { font-size: 0.7rem; font-weight: 600; color: #6b7280; margin-bottom: 4px; }
      .hourly-icon { font-size: 1.2rem; margin-bottom: 2px; }
      .hourly-temp { font-size: 0.8rem; font-weight: 600; color: #1a1a2e; }

      /* 5-day forecast row */
      .forecast-row { display: flex; gap: 8px; }
      .forecast-day { flex: 1; background: #fff; border-radius: 10px; border: 2px solid #e2e4e9; padding: 12px 8px; text-align: center; }
      .forecast-day-name { font-size: 0.75rem; font-weight: 600; color: #6b7280; text-transform: uppercase; margin-bottom: 6px; }
      .forecast-icon { font-size: 1.5rem; margin-bottom: 4px; }
      .forecast-temps { font-size: 0.8rem; }
      .forecast-high { font-weight: 600; color: #1a1a2e; }
      .forecast-low { color: #6b7280; }

      /* Loading */
      .loading-card { text-align: center; padding: 40px 24px; background: #fff; border-radius: 12px; border: 2px solid #e2e4e9; }
      .loading-text { color: #6b7280; font-size: 0.95rem; }
      @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
      .loading-text { animation: pulse 1.5s ease-in-out infinite; }

      /* Error */
      .error-card { padding: 20px 24px; background: #fef2f2; border-radius: 12px; border: 2px solid #ef4444; }
      .error-icon { font-size: 1.5rem; margin-bottom: 8px; }
      .error-message { font-size: 0.9rem; color: #dc2626; }

      /* Status bar */
      .status-bar { margin-top: 16px; padding: 8px 12px; background: #fff; border-radius: 8px; border: 1px solid #e2e4e9; font-size: 0.75rem; color: #6b7280; }
      .status-bar .event { color: #4a4ae0; font-weight: 600; }
    </style>
  </head>
  <body>
    <div class="weather-container">
      <div id="app"></div>
      <div class="status-bar" id="status">Bridge: waiting for host...</div>
    </div>

    <script>
      // -- WMO Weather Code Mapping ------------------------------------
      const WMO = {
        0:  { desc: "Clear sky",       icon: "\u2600\uFE0F" },
        1:  { desc: "Mainly clear",    icon: "\uD83C\uDF24\uFE0F" },
        2:  { desc: "Partly cloudy",   icon: "\u26C5" },
        3:  { desc: "Overcast",        icon: "\u2601\uFE0F" },
        45: { desc: "Fog",             icon: "\uD83C\uDF2B\uFE0F" },
        48: { desc: "Rime fog",        icon: "\uD83C\uDF2B\uFE0F" },
        51: { desc: "Light drizzle",   icon: "\uD83C\uDF26\uFE0F" },
        53: { desc: "Drizzle",         icon: "\uD83C\uDF26\uFE0F" },
        55: { desc: "Dense drizzle",   icon: "\uD83C\uDF26\uFE0F" },
        56: { desc: "Freezing drizzle",icon: "\uD83C\uDF27\uFE0F" },
        57: { desc: "Heavy freezing drizzle", icon: "\uD83C\uDF27\uFE0F" },
        61: { desc: "Light rain",      icon: "\uD83C\uDF27\uFE0F" },
        63: { desc: "Rain",            icon: "\uD83C\uDF27\uFE0F" },
        65: { desc: "Heavy rain",      icon: "\uD83C\uDF27\uFE0F" },
        66: { desc: "Freezing rain",   icon: "\uD83C\uDF27\uFE0F" },
        67: { desc: "Heavy freezing rain", icon: "\uD83C\uDF27\uFE0F" },
        71: { desc: "Light snow",      icon: "\uD83C\uDF28\uFE0F" },
        73: { desc: "Snow",            icon: "\uD83C\uDF28\uFE0F" },
        75: { desc: "Heavy snow",      icon: "\uD83C\uDF28\uFE0F" },
        77: { desc: "Snow grains",     icon: "\uD83C\uDF28\uFE0F" },
        80: { desc: "Light showers",   icon: "\uD83C\uDF26\uFE0F" },
        81: { desc: "Showers",         icon: "\uD83C\uDF26\uFE0F" },
        82: { desc: "Heavy showers",   icon: "\uD83C\uDF26\uFE0F" },
        85: { desc: "Light snow showers", icon: "\uD83C\uDF28\uFE0F" },
        86: { desc: "Heavy snow showers", icon: "\uD83C\uDF28\uFE0F" },
        95: { desc: "Thunderstorm",    icon: "\u26C8\uFE0F" },
        96: { desc: "Thunderstorm with hail", icon: "\u26C8\uFE0F" },
        99: { desc: "Thunderstorm with heavy hail", icon: "\u26C8\uFE0F" },
      };

      function wmo(code) {
        return WMO[code] || { desc: "Unknown", icon: "\uD83C\uDF10" };
      }

      function toF(c) { return Math.round(c * 9 / 5 + 32); }

      function tempStr(c) {
        if (state.unit === 'F') return toF(c) + '\u00B0F';
        return Math.round(c) + '\u00B0C';
      }

      // -- State -------------------------------------------------------
      let state = {
        location: null,
        resolvedName: null,
        country: null,
        current: null,
        hourly: null,
        daily: null,
        unit: 'C',
        error: null,
        loading: false,
      };
      let hostOrigin = null;
      let appSessionId = null;
      let messageNonce = null;
      var isStandalone = (window.parent === window);
      var protocolVersion = "1";

      // -- Bridge helpers ----------------------------------------------
      function send(event) {
        if (window.parent !== window && hostOrigin && appSessionId && messageNonce) {
          window.parent.postMessage({
            protocolVersion: protocolVersion,
            appSessionId: appSessionId,
            nonce: messageNonce,
            event: event
          }, hostOrigin);
        }
        log("\u2191 " + event.type);
      }

      function log(msg) {
        const el = document.getElementById("status");
        el.innerHTML = 'Bridge: <span class="event">' + msg + '</span>';
      }

      // -- Open-Meteo API ----------------------------------------------
      async function geocode(location) {
        const url = "https://geocoding-api.open-meteo.com/v1/search?name=" + encodeURIComponent(location) + "&count=1";
        const res = await fetch(url);
        if (!res.ok) throw new Error("Geocoding request failed");
        const data = await res.json();
        if (!data.results || data.results.length === 0) {
          throw new Error('Could not find location: "' + location + '"');
        }
        const r = data.results[0];
        return { latitude: r.latitude, longitude: r.longitude, name: r.name, country: r.country || "" };
      }

      async function fetchWeather(lat, lon) {
        const params = [
          "latitude=" + lat,
          "longitude=" + lon,
          "current=temperature_2m,relative_humidity_2m,apparent_temperature,weather_code,wind_speed_10m",
          "hourly=temperature_2m,weather_code",
          "daily=weather_code,temperature_2m_max,temperature_2m_min",
          "timezone=auto",
          "forecast_days=5",
        ].join("&");
        const res = await fetch("https://api.open-meteo.com/v1/forecast?" + params);
        if (!res.ok) throw new Error("Weather API request failed");
        return res.json();
      }

      async function loadWeather(location) {
        state.location = location;
        state.loading = true;
        state.error = null;
        render();

        try {
          const geo = await geocode(location);
          const data = await fetchWeather(geo.latitude, geo.longitude);

          state.resolvedName = geo.name;
          state.country = geo.country;
          state.current = {
            temp: data.current.temperature_2m,
            feelsLike: data.current.apparent_temperature,
            humidity: data.current.relative_humidity_2m,
            windSpeed: data.current.wind_speed_10m,
            weatherCode: data.current.weather_code,
          };
          // Parse next 24 hours of hourly data
          var now = new Date();
          var hourlySlice = [];
          for (var hi = 0; hi < data.hourly.time.length && hourlySlice.length < 24; hi++) {
            var ht = new Date(data.hourly.time[hi]);
            if (ht >= now) {
              hourlySlice.push({
                time: data.hourly.time[hi],
                temp: data.hourly.temperature_2m[hi],
                weatherCode: data.hourly.weather_code[hi],
              });
            }
          }
          state.hourly = hourlySlice;

          state.daily = data.daily.time.map(function (date, i) {
            return {
              date: date,
              weatherCode: data.daily.weather_code[i],
              high: data.daily.temperature_2m_max[i],
              low: data.daily.temperature_2m_min[i],
            };
          });
          state.loading = false;
          state.error = null;

          render();
          notifyResize();
          saveState();
          sendComplete();
        } catch (err) {
          state.loading = false;
          state.error = err.message || "Failed to fetch weather data.";
          render();
          notifyResize();
          send({ type: "app:error", payload: { message: state.error } });
        }
      }

      // -- Rendering ---------------------------------------------------
      function render() {
        var root = document.getElementById("app");

        if (state.loading) {
          root.innerHTML =
            '<h1>Weather</h1>' +
            '<p class="location-label">' + escHtml(state.location) + '</p>' +
            '<div class="loading-card"><div class="loading-text">Fetching weather...</div></div>';
          return;
        }

        if (state.error) {
          root.innerHTML =
            '<h1>Weather</h1>' +
            (state.location ? '<p class="location-label">' + escHtml(state.location) + '</p>' : '') +
            '<div class="error-card">' +
              '<div class="error-icon">\u26A0\uFE0F</div>' +
              '<div class="error-message">' + escHtml(state.error) + '</div>' +
            '</div>';
          return;
        }

        if (!state.current) {
          root.innerHTML = '<h1>Weather</h1>' + searchBarHtml() +
            (isStandalone ? '' : '<p style="color:#6b7280;margin-top:8px;">Waiting for location from host\u2026</p>');
          bindSearch();
          return;
        }

        var c = state.current;
        var w = wmo(c.weatherCode);

        var unitToggle =
          '<div class="unit-toggle">' +
            '<button class="unit-btn' + (state.unit === 'C' ? ' active' : '') + '" data-unit="C">\u00B0C</button>' +
            '<button class="unit-btn' + (state.unit === 'F' ? ' active' : '') + '" data-unit="F">\u00B0F</button>' +
          '</div>';

        // Hourly forecast (next 24h)
        var hourlyHtml = '';
        if (state.hourly && state.hourly.length > 0) {
          var hourlyItems = state.hourly.map(function (h) {
            var hw = wmo(h.weatherCode);
            var t = new Date(h.time);
            var timeLabel = t.toLocaleTimeString("en-US", { hour: "numeric", hour12: true });
            return (
              '<div class="hourly-item">' +
                '<div class="hourly-time">' + timeLabel + '</div>' +
                '<div class="hourly-icon">' + hw.icon + '</div>' +
                '<div class="hourly-temp">' + tempStr(h.temp) + '</div>' +
              '</div>'
            );
          }).join("");
          hourlyHtml = '<div class="section-label">Next 24 Hours</div>' +
            '<div class="hourly-scroll">' + hourlyItems + '</div>';
        }

        var forecastHtml = state.daily.map(function (d) {
          var dw = wmo(d.weatherCode);
          var dayName = new Date(d.date + "T00:00:00").toLocaleDateString("en-US", { weekday: "short" });
          return (
            '<div class="forecast-day">' +
              '<div class="forecast-day-name">' + dayName + '</div>' +
              '<div class="forecast-icon">' + dw.icon + '</div>' +
              '<div class="forecast-temps">' +
                '<span class="forecast-high">' + tempStr(d.high) + '</span> ' +
                '<span class="forecast-low">' + tempStr(d.low) + '</span>' +
              '</div>' +
            '</div>'
          );
        }).join("");

        root.innerHTML =
          '<div class="title-row"><h1>Weather</h1>' + unitToggle + '</div>' + searchBarHtml() +
          '<p class="location-label">' + escHtml(state.resolvedName) + ', ' + escHtml(state.country) + '</p>' +
          '<div class="current-card">' +
            '<div class="current-header">' +
              '<div>' +
                '<div class="current-temp">' + tempStr(c.temp) + '</div>' +
              '</div>' +
              '<div class="current-icon">' + w.icon + '</div>' +
            '</div>' +
            '<div class="current-desc">' + w.desc + '</div>' +
            '<div class="current-feels">Feels like ' + tempStr(c.feelsLike) + '</div>' +
            '<div class="current-details">' +
              '<div class="detail-item">Humidity <span class="detail-value">' + c.humidity + '%</span></div>' +
              '<div class="detail-item">Wind <span class="detail-value">' + c.windSpeed + ' km/h</span></div>' +
            '</div>' +
          '</div>' +
          hourlyHtml +
          '<div class="section-label">5-Day Forecast</div>' +
          '<div class="forecast-row">' + forecastHtml + '</div>';

        // Bind unit toggle
        root.querySelectorAll(".unit-btn").forEach(function (btn) {
          btn.addEventListener("click", function () {
            state.unit = btn.dataset.unit;
            render();
          });
        });
        bindSearch();
      }

      function escHtml(str) {
        var d = document.createElement("div");
        d.textContent = str || "";
        return d.innerHTML;
      }

      function searchBarHtml() {
        if (!isStandalone) return '';
        return '<div class="search-bar">' +
          '<input type="text" id="search-input" placeholder="Enter a city, e.g. Tokyo" />' +
          '<button id="search-btn">Search</button>' +
        '</div>';
      }

      function bindSearch() {
        var input = document.getElementById("search-input");
        var btn = document.getElementById("search-btn");
        if (!input || !btn) return;
        btn.addEventListener("click", function () {
          var val = input.value.trim();
          if (val) loadWeather(val);
        });
        input.addEventListener("keydown", function (e) {
          if (e.key === "Enter") {
            var val = input.value.trim();
            if (val) loadWeather(val);
          }
        });
      }

      // -- Bridge events -----------------------------------------------
      function notifyResize() {
        var height = document.documentElement.scrollHeight;
        send({ type: "app:resize", payload: { height: height } });
      }

      function saveState() {
        send({ type: "app:save-state", payload: { state: {
          location: state.location,
          resolvedName: state.resolvedName,
          country: state.country,
          current: state.current,
          hourly: state.hourly,
          daily: state.daily,
          unit: state.unit,
        } } });
      }

      function sendComplete() {
        var c = state.current;
        var w = wmo(c.weatherCode);

        var forecastText = state.daily.map(function (d) {
          var dayName = new Date(d.date + "T00:00:00").toLocaleDateString("en-US", { weekday: "short" });
          return dayName + " " + Math.round(d.high) + "\u00B0/" + Math.round(d.low) + "\u00B0";
        }).join(", ");

        var summary = "Weather in " + state.resolvedName + ", " + state.country + ": " +
          w.desc + ", " + Math.round(c.temp) + "\u00B0C (feels like " + Math.round(c.feelsLike) + "\u00B0C), " +
          "humidity " + c.humidity + "%, wind " + c.windSpeed + " km/h. " +
          "5-day forecast: " + forecastText + ".";

        send({
          type: "app:complete",
          payload: {
            summary: summary,
            output: {
              location: state.resolvedName,
              country: state.country,
              current: { temp: c.temp, feelsLike: c.feelsLike, humidity: c.humidity, windSpeed: c.windSpeed, description: w.desc },
              daily: state.daily,
            },
          },
        });
      }

      // -- Bridge listener ---------------------------------------------
      window.addEventListener("message", function (e) {
        var envelope = e.data;
        if (!envelope || envelope.protocolVersion !== protocolVersion || !envelope.event || !envelope.nonce) return;

        var msg = envelope.event;
        if (!msg || !msg.type) return;

        log("\u2193 " + msg.type);

        switch (msg.type) {
          case "host:init":
            hostOrigin = e.origin;
            appSessionId = envelope.appSessionId;
            messageNonce = envelope.nonce;
            send({ type: "app:ready", payload: { appId: "weather", version: "0.1.0" } });
            if (msg.payload && msg.payload.input && msg.payload.input.location) {
              loadWeather(msg.payload.input.location);
            }
            break;

          case "host:resume-session":
            hostOrigin = e.origin;
            appSessionId = envelope.appSessionId;
            messageNonce = envelope.nonce;
            if (msg.payload && msg.payload.state) {
              state = {
                location: msg.payload.state.location || null,
                resolvedName: msg.payload.state.resolvedName || null,
                country: msg.payload.state.country || null,
                current: msg.payload.state.current || null,
                hourly: msg.payload.state.hourly || null,
                daily: msg.payload.state.daily || null,
                unit: msg.payload.state.unit || 'C',
                error: null,
                loading: false,
              };
            }
            send({ type: "app:ready", payload: { appId: "weather", version: "0.1.0" } });
            render();
            notifyResize();
            break;

          case "host:tool-result":
            if (msg.payload && msg.payload.toolName === "get_weather" && msg.payload.result) {
              var location = msg.payload.result.location;
              if (location) {
                loadWeather(location);
              }
            }
            break;

          case "host:request-complete":
            if (state.current && !state.error) {
              sendComplete();
            }
            break;

          default:
            break;
        }
      });

      // -- Initial render ----------------------------------------------
      render();
    </script>
  </body>
</html>
