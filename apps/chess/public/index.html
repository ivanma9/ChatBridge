<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chess</title>
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css" />
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { font-family: system-ui, -apple-system, sans-serif; background: #f8f9fa; color: #1a1a2e; padding: 16px; }

      .chess-container { max-width: 660px; margin: 0 auto; }

      .header {
        display: flex; justify-content: space-between; align-items: center;
        margin-bottom: 12px;
      }
      .header h1 { font-size: 1.25rem; }
      .controls { display: flex; gap: 8px; }
      .controls button {
        padding: 6px 14px; border: 2px solid #e2e4e9; border-radius: 8px;
        background: #fff; font-size: 0.85rem; cursor: pointer;
        font-family: inherit; transition: all 0.15s;
      }
      .controls button:hover { border-color: #4a4ae0; background: #f0f0ff; }
      .controls button.danger:hover { border-color: #ef4444; background: #fef2f2; }

      .main { display: flex; gap: 16px; flex-wrap: wrap; }

      #board-wrap { width: 400px; flex-shrink: 0; }

      .side-panel {
        flex: 1; min-width: 180px; display: flex; flex-direction: column;
      }
      .side-panel h2 { font-size: 0.9rem; color: #6b7280; margin-bottom: 8px; }

      #move-history {
        flex: 1; max-height: 370px; overflow-y: auto;
        background: #fff; border: 1px solid #e2e4e9; border-radius: 8px;
        padding: 8px 12px; font-size: 0.85rem; font-family: 'SF Mono', 'Cascadia Code', monospace;
      }
      .move-row { display: flex; gap: 4px; padding: 2px 0; }
      .move-num { color: #9ca3af; width: 28px; text-align: right; flex-shrink: 0; }
      .white-move, .black-move { width: 60px; }
      .white-move { color: #1a1a2e; }
      .black-move { color: #4b5563; }

      .status-bar {
        margin-top: 12px; padding: 10px 14px;
        background: #fff; border-radius: 8px; border: 2px solid #e2e4e9;
        font-size: 0.9rem; font-weight: 600; text-align: center;
        transition: all 0.2s;
      }
      .status-bar .turn-dot {
        display: inline-block; width: 10px; height: 10px; border-radius: 50%;
        margin-right: 8px; vertical-align: middle;
        border: 1px solid #ccc;
      }
      .status-bar.player-turn { border-color: #4a4ae0; color: #4a4ae0; background: #f0f0ff; }
      .status-bar.player-turn .turn-dot { background: #fff; border-color: #999; }
      .status-bar.ai-turn { border-color: #6b7280; color: #6b7280; background: #f9fafb; }
      .status-bar.ai-turn .turn-dot { background: #1a1a2e; border-color: #1a1a2e; }
      .status-bar.check { border-color: #f59e0b; color: #f59e0b; background: #fffbeb; }
      .status-bar.win { border-color: #22c55e; color: #22c55e; background: #f0fdf4; }
      .status-bar.lose { border-color: #ef4444; color: #ef4444; background: #fef2f2; }
      .status-bar.draw { border-color: #6b7280; color: #6b7280; background: #f9fafb; }

      .bridge-bar {
        margin-top: 8px; padding: 6px 12px;
        background: #fff; border-radius: 8px; border: 1px solid #e2e4e9;
        font-size: 0.75rem; color: #6b7280;
      }
      .bridge-bar .event { color: #4a4ae0; font-weight: 600; }

      .invalid-flash {
        animation: flashRed 0.4s;
      }
      @keyframes flashRed {
        0%, 100% { border-color: #e2e4e9; }
        50% { border-color: #ef4444; }
      }
    </style>
  </head>
  <body>
    <div class="chess-container">
      <div class="header">
        <h1>Chess vs AI</h1>
        <div class="controls">
          <button id="new-game-btn">New Game</button>
          <button id="resign-btn" class="danger">Resign</button>
        </div>
      </div>
      <div class="main">
        <div id="board-wrap">
          <div id="board" style="width: 400px"></div>
        </div>
        <div class="side-panel">
          <h2>Moves</h2>
          <div id="move-history"></div>
        </div>
      </div>
      <div class="status-bar" id="status">Waiting for host&hellip;</div>
      <div class="bridge-bar" id="bridge-status">Bridge: waiting for host&hellip;</div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>

    <script>
      // ── Constants ─────────────────────────────────────────────────────
      var APP_ID = 'chess';
      var APP_VERSION = '0.1.0';
      var AI_DEPTH = 3;
      var AI_DELAY_MS = 300;
      var CHECKMATE_SCORE = 100000;

      var PIECE_VALUES = { p: 100, n: 320, b: 330, r: 500, q: 900, k: 20000 };

      // Piece-square tables (from white's perspective, row 0 = rank 8)
      var PST = {
        p: [
           0,  0,  0,  0,  0,  0,  0,  0,
          50, 50, 50, 50, 50, 50, 50, 50,
          10, 10, 20, 30, 30, 20, 10, 10,
           5,  5, 10, 25, 25, 10,  5,  5,
           0,  0,  0, 20, 20,  0,  0,  0,
           5, -5,-10,  0,  0,-10, -5,  5,
           5, 10, 10,-20,-20, 10, 10,  5,
           0,  0,  0,  0,  0,  0,  0,  0
        ],
        n: [
          -50,-40,-30,-30,-30,-30,-40,-50,
          -40,-20,  0,  0,  0,  0,-20,-40,
          -30,  0, 10, 15, 15, 10,  0,-30,
          -30,  5, 15, 20, 20, 15,  5,-30,
          -30,  0, 15, 20, 20, 15,  0,-30,
          -30,  5, 10, 15, 15, 10,  5,-30,
          -40,-20,  0,  5,  5,  0,-20,-40,
          -50,-40,-30,-30,-30,-30,-40,-50
        ],
        b: [
          -20,-10,-10,-10,-10,-10,-10,-20,
          -10,  0,  0,  0,  0,  0,  0,-10,
          -10,  0, 10, 10, 10, 10,  0,-10,
          -10,  5,  5, 10, 10,  5,  5,-10,
          -10,  0, 10, 10, 10, 10,  0,-10,
          -10, 10, 10, 10, 10, 10, 10,-10,
          -10,  5,  0,  0,  0,  0,  5,-10,
          -20,-10,-10,-10,-10,-10,-10,-20
        ],
        r: [
           0,  0,  0,  0,  0,  0,  0,  0,
           5, 10, 10, 10, 10, 10, 10,  5,
          -5,  0,  0,  0,  0,  0,  0, -5,
          -5,  0,  0,  0,  0,  0,  0, -5,
          -5,  0,  0,  0,  0,  0,  0, -5,
          -5,  0,  0,  0,  0,  0,  0, -5,
          -5,  0,  0,  0,  0,  0,  0, -5,
           0,  0,  0,  5,  5,  0,  0,  0
        ],
        q: [
          -20,-10,-10, -5, -5,-10,-10,-20,
          -10,  0,  0,  0,  0,  0,  0,-10,
          -10,  0,  5,  5,  5,  5,  0,-10,
           -5,  0,  5,  5,  5,  5,  0, -5,
            0,  0,  5,  5,  5,  5,  0, -5,
          -10,  5,  5,  5,  5,  5,  0,-10,
          -10,  0,  5,  0,  0,  0,  0,-10,
          -20,-10,-10, -5, -5,-10,-10,-20
        ],
        k: [
          -30,-40,-40,-50,-50,-40,-40,-30,
          -30,-40,-40,-50,-50,-40,-40,-30,
          -30,-40,-40,-50,-50,-40,-40,-30,
          -30,-40,-40,-50,-50,-40,-40,-30,
          -20,-30,-30,-40,-40,-30,-30,-20,
          -10,-20,-20,-20,-20,-20,-20,-10,
           20, 20,  0,  0,  0,  0, 20, 20,
           20, 30, 10,  0,  0, 10, 30, 20
        ]
      };

      // ── State ─────────────────────────────────────────────────────────
      var game = new Chess();
      var board = null;
      var moveHistory = [];
      var gameActive = false;
      var aiThinking = false;

      // Bridge state
      var hostOrigin = null;
      var appSessionId = null;
      var chatSessionId = null;
      var messageNonce = null;
      var protocolVersion = '1';

      // ── Bridge helpers ────────────────────────────────────────────────
      function send(event) {
        if (window.parent !== window && hostOrigin && appSessionId && messageNonce) {
          window.parent.postMessage({
            protocolVersion: protocolVersion,
            appSessionId: appSessionId,
            nonce: messageNonce,
            event: event
          }, hostOrigin);
        }
        bridgeLog('↑ ' + event.type);
      }

      function bridgeLog(msg) {
        var el = document.getElementById('bridge-status');
        el.innerHTML = 'Bridge: <span class="event">' + msg + '</span>';
      }

      function notifyResize() {
        var height = document.documentElement.scrollHeight;
        send({ type: 'app:resize', payload: { height: height } });
      }

      function saveState() {
        var status = 'playing';
        if (game.in_checkmate()) status = 'checkmate';
        else if (game.in_stalemate()) status = 'stalemate';
        else if (game.in_draw()) status = 'draw';
        else if (game.in_check()) status = 'check';

        send({
          type: 'app:save-state',
          payload: {
            state: {
              fen: game.fen(),
              pgn: game.pgn(),
              history: moveHistory.slice(),
              currentTurn: game.turn() === 'w' ? 'white' : 'black',
              status: status,
              moveCount: moveHistory.length,
              isCheck: game.in_check()
            }
          }
        });
      }

      function sendComplete(result, winner) {
        var totalMoves = moveHistory.length;
        var summary;

        if (result === 'checkmate') {
          summary = winner === 'white'
            ? 'Checkmate! You won in ' + totalMoves + ' moves.'
            : 'Checkmate! AI wins after ' + totalMoves + ' moves.';
        } else if (result === 'stalemate') {
          summary = 'Stalemate — draw after ' + totalMoves + ' moves.';
        } else if (result === 'draw') {
          summary = 'Draw after ' + totalMoves + ' moves.';
        } else if (result === 'resigned') {
          summary = 'You resigned after ' + totalMoves + ' moves.';
        }

        send({
          type: 'app:complete',
          payload: {
            summary: summary,
            output: {
              result: result,
              winner: winner,
              totalMoves: totalMoves,
              pgn: game.pgn(),
              fen: game.fen()
            }
          }
        });
      }

      // ── AI Engine ─────────────────────────────────────────────────────
      function getPSTValue(type, color, row, col) {
        var table = PST[type];
        if (!table) return 0;
        var r = color === 'w' ? row : 7 - row;
        return table[r * 8 + col];
      }

      function evaluateBoard() {
        if (game.in_checkmate()) {
          return game.turn() === 'w' ? -CHECKMATE_SCORE : CHECKMATE_SCORE;
        }
        if (game.in_draw() || game.in_stalemate() || game.in_threefold_repetition()) {
          return 0;
        }

        var score = 0;
        var b = game.board();
        for (var row = 0; row < 8; row++) {
          for (var col = 0; col < 8; col++) {
            var piece = b[row][col];
            if (!piece) continue;
            var val = PIECE_VALUES[piece.type] + getPSTValue(piece.type, piece.color, row, col);
            score += piece.color === 'w' ? val : -val;
          }
        }
        return score;
      }

      function orderMoves(moves) {
        return moves.sort(function(a, b) {
          var ac = a.indexOf('x') !== -1 ? 1 : 0;
          var bc = b.indexOf('x') !== -1 ? 1 : 0;
          return bc - ac;
        });
      }

      function minimax(depth, alpha, beta, isMaximizing) {
        if (depth === 0 || game.game_over()) {
          return evaluateBoard();
        }

        var moves = orderMoves(game.moves());

        if (isMaximizing) {
          var maxScore = -Infinity;
          for (var i = 0; i < moves.length; i++) {
            game.move(moves[i]);
            var score = minimax(depth - 1, alpha, beta, false);
            game.undo();
            if (score > maxScore) maxScore = score;
            if (score > alpha) alpha = score;
            if (beta <= alpha) break;
          }
          return maxScore;
        } else {
          var minScore = Infinity;
          for (var i = 0; i < moves.length; i++) {
            game.move(moves[i]);
            var score = minimax(depth - 1, alpha, beta, true);
            game.undo();
            if (score < minScore) minScore = score;
            if (score < beta) beta = score;
            if (beta <= alpha) break;
          }
          return minScore;
        }
      }

      function getBestMove() {
        var moves = orderMoves(game.moves());
        var bestMove = null;
        var bestValue = Infinity; // AI is black, minimizing

        for (var i = 0; i < moves.length; i++) {
          game.move(moves[i]);
          var score = minimax(AI_DEPTH - 1, -Infinity, Infinity, true);
          game.undo();
          if (score < bestValue) {
            bestValue = score;
            bestMove = moves[i];
          }
        }
        return bestMove;
      }

      // ── UI Rendering ──────────────────────────────────────────────────
      function updateStatus(text, cssClass) {
        var el = document.getElementById('status');
        el.className = 'status-bar';
        if (cssClass) el.className += ' ' + cssClass;
        // Add turn-dot for player/AI turn indicators
        if (cssClass === 'player-turn' || cssClass === 'ai-turn') {
          el.innerHTML = '<span class="turn-dot"></span>' + text;
        } else {
          el.textContent = text;
        }
      }

      function renderMoveHistory() {
        var panel = document.getElementById('move-history');
        var html = '';
        for (var i = 0; i < moveHistory.length; i += 2) {
          var moveNum = Math.floor(i / 2) + 1;
          var whiteMove = moveHistory[i];
          var blackMove = moveHistory[i + 1] || '';
          html += '<div class="move-row">'
            + '<span class="move-num">' + moveNum + '.</span>'
            + '<span class="white-move">' + whiteMove + '</span>'
            + '<span class="black-move">' + blackMove + '</span>'
            + '</div>';
        }
        panel.innerHTML = html;
        panel.scrollTop = panel.scrollHeight;
      }

      // ── Game Logic ────────────────────────────────────────────────────
      function checkGameEnd() {
        if (!game.game_over()) {
          if (game.in_check()) {
            updateStatus('Check!', 'check');
          }
          return false;
        }

        gameActive = false;

        if (game.in_checkmate()) {
          var winner = game.turn() === 'w' ? 'black' : 'white';
          if (winner === 'white') {
            updateStatus('Checkmate — you win!', 'win');
          } else {
            updateStatus('Checkmate — AI wins!', 'lose');
          }
          sendComplete('checkmate', winner);
        } else if (game.in_stalemate()) {
          updateStatus('Stalemate — draw', 'draw');
          sendComplete('stalemate', 'draw');
        } else if (game.in_draw()) {
          updateStatus('Draw', 'draw');
          sendComplete('draw', 'draw');
        }

        saveState();
        notifyResize();
        return true;
      }

      function makeAIMove() {
        if (!gameActive || game.game_over()) return;

        aiThinking = true;
        updateStatus('AI thinking\u2026', 'ai-turn');

        setTimeout(function() {
          try {
            var move = getBestMove();
            if (move) {
              game.move(move);
              moveHistory.push(move);
              board.position(game.fen());
              renderMoveHistory();
              saveState();
            }
          } catch (e) {
            // Fallback: random legal move
            var moves = game.moves();
            if (moves.length > 0) {
              var randomMove = moves[Math.floor(Math.random() * moves.length)];
              game.move(randomMove);
              moveHistory.push(randomMove);
              board.position(game.fen());
              renderMoveHistory();
              saveState();
            }
          }

          aiThinking = false;

          if (!checkGameEnd()) {
            updateStatus('Your turn', 'player-turn');
          }
          notifyResize();
        }, AI_DELAY_MS);
      }

      // ── Chessboard.js callbacks ───────────────────────────────────────
      function onDragStart(source, piece) {
        if (!gameActive) return false;
        if (aiThinking) return false;
        if (game.game_over()) return false;
        if (game.turn() !== 'w') return false;
        if (piece.search(/^b/) !== -1) return false;
      }

      function onDrop(source, target) {
        var move = game.move({
          from: source,
          to: target,
          promotion: 'q'
        });

        if (move === null) {
          updateStatus('Invalid move — try again');
          setTimeout(function() {
            if (gameActive && !aiThinking) updateStatus('Your turn', 'player-turn');
          }, 1000);
          return 'snapback';
        }

        moveHistory.push(move.san);
        renderMoveHistory();
        saveState();

        if (!checkGameEnd()) {
          makeAIMove();
        }
      }

      function onSnapEnd() {
        board.position(game.fen());
      }

      // ── Game lifecycle ────────────────────────────────────────────────
      function startNewGame() {
        game.reset();
        moveHistory = [];
        gameActive = true;
        aiThinking = false;

        if (board) {
          board.position('start');
        }

        renderMoveHistory();
        updateStatus('Your turn', 'player-turn');
        saveState();
        notifyResize();
      }

      function resign() {
        if (!gameActive) return;
        gameActive = false;
        updateStatus('You resigned — AI wins', 'lose');
        sendComplete('resigned', 'black');
        saveState();
        notifyResize();
      }

      function restoreState(savedState) {
        if (!savedState) return false;

        try {
          var loaded = game.load(savedState.fen);
          if (!loaded) return false;

          moveHistory = savedState.history || [];
          gameActive = savedState.status === 'playing' || savedState.status === 'check';
          board.position(game.fen());
          renderMoveHistory();

          if (gameActive) {
            if (game.turn() === 'w') {
              updateStatus('Your turn', 'player-turn');
            } else {
              makeAIMove();
            }
          } else {
            updateStatus('Game over');
          }

          notifyResize();
          return true;
        } catch (e) {
          return false;
        }
      }

      // ── Initialize board ──────────────────────────────────────────────
      function initBoard() {
        if (typeof Chessboard === 'undefined' || typeof Chess === 'undefined') {
          updateStatus('Error: failed to load chess libraries');
          send({ type: 'app:error', payload: { message: 'CDN libraries failed to load' } });
          return;
        }

        board = Chessboard('board', {
          draggable: true,
          position: 'start',
          orientation: 'white',
          pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png',
          onDragStart: onDragStart,
          onDrop: onDrop,
          onSnapEnd: onSnapEnd
        });
      }

      // ── Button handlers ───────────────────────────────────────────────
      document.getElementById('new-game-btn').addEventListener('click', function() {
        startNewGame();
      });

      document.getElementById('resign-btn').addEventListener('click', function() {
        resign();
      });

      // ── Bridge listener ───────────────────────────────────────────────
      window.addEventListener('message', function(e) {
        var envelope = e.data;
        if (!envelope || envelope.protocolVersion !== protocolVersion || !envelope.event || !envelope.nonce) return;

        var msg = envelope.event;
        if (!msg || !msg.type) return;

        bridgeLog('↓ ' + msg.type);

        switch (msg.type) {
          case 'host:init':
            hostOrigin = e.origin;
            appSessionId = envelope.appSessionId;
            chatSessionId = msg.payload.chatSessionId;
            messageNonce = envelope.nonce;
            send({ type: 'app:ready', payload: { appId: APP_ID, version: APP_VERSION } });
            initBoard();
            startNewGame();
            break;

          case 'host:resume-session':
            hostOrigin = e.origin;
            appSessionId = envelope.appSessionId;
            messageNonce = envelope.nonce;
            send({ type: 'app:ready', payload: { appId: APP_ID, version: APP_VERSION } });
            initBoard();
            if (!restoreState(msg.payload.state)) {
              startNewGame();
            }
            break;

          case 'host:request-complete':
            if (gameActive) {
              resign();
            }
            break;

          default:
            break;
        }
      });

      // ── Standalone mode ───────────────────────────────────────────────
      if (window.parent === window) {
        hostOrigin = window.location.origin;
        bridgeLog('standalone mode');
        initBoard();
        startNewGame();
      }
    </script>
  </body>
</html>
