services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: chatbridge_dev
      POSTGRES_USER: chatbridge
      POSTGRES_PASSWORD: chatbridge
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chatbridge -d chatbridge_dev"]
      interval: 2s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
